AWSTemplateFormatVersion: '2010-09-09'
Description: Telco ODS Autonomous Networks ML Pipeline Demo

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access

  AllowedSSHCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to SSH (restrict to your IP for security)

  MongoDBUri:
    Type: String
    NoEcho: true
    Default: mongodb+srv://admin:IpAQeOM854tLQ5rP@democluster.hyszr.mongodb.net/?retryWrites=true&w=majority&appName=DemoCluster
    Description: MongoDB Atlas connection string

  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: Ubuntu 22.04 AMI (auto-resolved via SSM)

  S3ArtifactBucket:
    Type: String
    Default: telco-ods-demo-artifacts-ap-southeast-2
    Description: S3 bucket with pre-cached binaries (Flink tarball, Kafka connector)

Resources:
  # --- VPC & Networking ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: telco-ods-demo-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: telco-ods-demo-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: telco-ods-demo-public

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: telco-ods-demo-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # --- Security Groups ---
  KafkaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Kafka broker security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9092
          ToPort: 9092
          CidrIp: 10.0.0.0/16
          Description: Kafka broker (VPC internal)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCidr
          Description: SSH
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: telco-ods-demo-kafka-sg

  PipelineSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Pipeline instances (generator, flink) security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.0.0.0/16
          Description: SSH from dashboard (intra-VPC)
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          CidrIp: !Ref AllowedSSHCidr
          Description: Flink Web UI
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: telco-ods-demo-pipeline-sg

  MLflowSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MLflow server security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 5002
          ToPort: 5002
          CidrIp: 0.0.0.0/0
          Description: MLflow tracking UI
        - IpProtocol: tcp
          FromPort: 5003
          ToPort: 5003
          CidrIp: 0.0.0.0/0
          Description: MLflow model serving
        - IpProtocol: tcp
          FromPort: 8050
          ToPort: 8050
          CidrIp: 0.0.0.0/0
          Description: Dashboard
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: telco-ods-demo-mlflow-sg

  FeastSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Feast feature server security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 6566
          ToPort: 6566
          CidrIp: 10.0.0.0/16
          Description: Feast feature server (VPC internal)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: telco-ods-demo-feast-sg

  # --- EC2 Instances ---
  KafkaInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: t3.xlarge
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref KafkaSG
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/kafka-setup.log 2>&1

          apt-get update
          apt-get install -y default-jdk wget gnupg

          # Install Kafka via Confluent APT repo (fast CDN)
          wget -qO - https://packages.confluent.io/deb/7.6/archive.key | gpg --dearmor -o /usr/share/keyrings/confluent.gpg
          echo "deb [signed-by=/usr/share/keyrings/confluent.gpg] https://packages.confluent.io/deb/7.6 stable main" > /etc/apt/sources.list.d/confluent.list
          apt-get update
          apt-get install -y confluent-kafka

          PRIVATE_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)

          # Configure KRaft mode (no Zookeeper)
          mkdir -p /var/lib/kafka/data /var/log/kafka
          chown -R ubuntu:ubuntu /var/lib/kafka /var/log/kafka

          cat > /etc/kafka/kraft/server.properties << KAFKAEOF
          process.roles=broker,controller
          node.id=1
          controller.quorum.voters=1@${!PRIVATE_IP}:9093
          listeners=PLAINTEXT://${!PRIVATE_IP}:9092,CONTROLLER://${!PRIVATE_IP}:9093
          advertised.listeners=PLAINTEXT://${!PRIVATE_IP}:9092
          controller.listener.names=CONTROLLER
          inter.broker.listener.name=PLAINTEXT
          listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          log.dirs=/var/lib/kafka/data
          num.partitions=12
          num.network.threads=8
          num.io.threads=16
          socket.send.buffer.bytes=102400
          socket.receive.buffer.bytes=102400
          socket.request.max.bytes=104857600
          default.replication.factor=1
          offsets.topic.replication.factor=1
          transaction.state.log.replication.factor=1
          transaction.state.log.min.isr=1
          log.retention.hours=2
          log.retention.bytes=21474836480
          log.segment.bytes=1073741824
          KAFKAEOF

          CLUSTER_ID=$(kafka-storage random-uuid)
          kafka-storage format -t ${!CLUSTER_ID} -c /etc/kafka/kraft/server.properties
          chown -R ubuntu:ubuntu /var/lib/kafka

          cat > /etc/systemd/system/kafka.service << SVCEOF
          [Unit]
          Description=Apache Kafka (KRaft)
          After=network.target
          [Service]
          Type=simple
          User=ubuntu
          ExecStart=/usr/bin/kafka-server-start /etc/kafka/kraft/server.properties
          Restart=on-failure
          RestartSec=10
          [Install]
          WantedBy=multi-user.target
          SVCEOF

          systemctl daemon-reload
          systemctl enable kafka
          systemctl start kafka
          sleep 15

          kafka-topics --create \
            --bootstrap-server ${!PRIVATE_IP}:9092 \
            --topic telco-raw-telemetry \
            --partitions 12 \
            --replication-factor 1 \
            --config retention.ms=86400000

          echo "KAFKA_READY" > /tmp/kafka-status
      Tags:
        - Key: Name
          Value: telco-ods-demo-kafka

  MLflowInstance:
    Type: AWS::EC2::Instance
    DependsOn: [FlinkInstance, GeneratorInstance, FeastInstance]
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: t3.large
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref MLflowSG
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/mlflow-setup.log 2>&1

          apt-get update
          apt-get install -y python3-pip python3-venv

          mkdir -p /opt/mlflow/app /opt/dashboard
          cd /opt/mlflow

          python3 -m venv venv
          source venv/bin/activate
          pip install mlflow==3.12.0 scikit-learn pandas numpy "pymongo[srv]" python-dotenv flask

          # Env files
          cat > /opt/mlflow/.env << ENVEOF
          MONGODB_URI=${MongoDBUri}
          MLFLOW_TRACKING_URI=http://0.0.0.0:5002
          ENVEOF

          cat > /opt/dashboard/env.sh << DASHEOF
          export MONGODB_URI="${MongoDBUri}"
          export SSH_KEY=/opt/dashboard/bennyk_aws_key.pem
          export GENERATOR_IP=${GeneratorInstance.PrivateIp}
          export FLINK_IP=${FlinkInstance.PrivateIp}
          export FEAST_IP=${FeastInstance.PrivateIp}
          export FLINK_PUBLIC_IP=${FlinkInstance.PublicIp}
          DASHEOF

          chown -R ubuntu:ubuntu /opt/mlflow /opt/dashboard

          # MLflow tracking service (--allowed-hosts * and --cors-allowed-origins * required for IP-based access)
          cat > /etc/systemd/system/mlflow-tracking.service << SVCEOF
          [Unit]
          Description=MLflow Tracking Server
          After=network.target
          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/opt/mlflow
          ExecStart=/opt/mlflow/venv/bin/mlflow server --host 0.0.0.0 --port 5002 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /opt/mlflow/artifacts --allowed-hosts "*" --cors-allowed-origins "*"
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
          SVCEOF

          systemctl daemon-reload
          systemctl enable mlflow-tracking
          systemctl start mlflow-tracking

          touch /var/log/mlflow-serve.log /var/log/dashboard.log
          chown ubuntu:ubuntu /var/log/mlflow-serve.log /var/log/dashboard.log

          echo "MLFLOW_READY" > /tmp/mlflow-status
      Tags:
        - Key: Name
          Value: telco-ods-demo-mlflow

  FlinkInstance:
    Type: AWS::EC2::Instance
    DependsOn: KafkaInstance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: c5.4xlarge
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref PipelineSG
      IamInstanceProfile: !Ref EC2InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/flink-setup.log 2>&1

          apt-get update
          apt-get install -y default-jdk python3-pip python3-venv awscli

          # Flink job config
          mkdir -p /opt/flink-job
          cat > /opt/flink-job-config.env << CFGEOF
          KAFKA_BROKER=${KafkaInstance.PrivateIp}:9092
          KAFKA_TOPIC=telco-raw-telemetry
          MONGODB_URI=${MongoDBUri}
          MONGODB_DB=ods_demo_db
          MONGODB_COLLECTION=windowed_network_metrics
          CFGEOF

          # Download Flink from S3 (fast, in-region) with fallback to Apache
          FLINK_VERSION=1.18.1
          if aws s3 cp s3://${S3ArtifactBucket}/flink-${!FLINK_VERSION}-bin-scala_2.12.tgz /tmp/flink.tgz 2>/dev/null; then
            echo "Downloaded Flink from S3"
          else
            echo "S3 not available, downloading from Apache..."
            wget -q https://archive.apache.org/dist/flink/flink-${!FLINK_VERSION}/flink-${!FLINK_VERSION}-bin-scala_2.12.tgz -O /tmp/flink.tgz
          fi
          tar -xzf /tmp/flink.tgz -C /opt/
          mv /opt/flink-${!FLINK_VERSION} /opt/flink
          chown -R ubuntu:ubuntu /opt/flink
          rm /tmp/flink.tgz

          # Kafka connector JAR
          if aws s3 cp s3://${S3ArtifactBucket}/flink-sql-connector-kafka-3.1.0-1.18.jar /opt/flink/lib/ 2>/dev/null; then
            echo "Downloaded Kafka connector from S3"
          else
            wget -q https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/3.1.0-1.18/flink-sql-connector-kafka-3.1.0-1.18.jar -O /opt/flink/lib/flink-sql-connector-kafka-3.1.0-1.18.jar
          fi

          # Configure Flink standalone
          cat > /opt/flink/conf/flink-conf.yaml << FLINKEOF
          jobmanager.rpc.address: localhost
          jobmanager.rpc.port: 6123
          jobmanager.memory.process.size: 2048m
          taskmanager.memory.process.size: 8192m
          taskmanager.numberOfTaskSlots: 8
          parallelism.default: 4
          rest.port: 8081
          rest.address: 0.0.0.0
          rest.bind-address: 0.0.0.0
          python.client.executable: /opt/flink-env/bin/python3
          python.executable: /opt/flink-env/bin/python3
          FLINKEOF

          # Python environment for PyFlink
          python3 -m venv /opt/flink-env
          chown -R ubuntu:ubuntu /opt/flink-env
          source /opt/flink-env/bin/activate
          pip install apache-flink==1.18.1 "pymongo[srv]"

          chown -R ubuntu:ubuntu /opt/flink-job

          # Flink systemd service
          cat > /etc/systemd/system/flink.service << SVCEOF
          [Unit]
          Description=Apache Flink Cluster
          After=network.target
          [Service]
          Type=forking
          User=ubuntu
          Environment=JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          ExecStart=/opt/flink/bin/start-cluster.sh
          ExecStop=/opt/flink/bin/stop-cluster.sh
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target
          SVCEOF

          systemctl daemon-reload
          systemctl enable flink
          systemctl start flink

          touch /var/log/flink-job.log
          chown ubuntu:ubuntu /var/log/flink-job.log

          echo "FLINK_READY" > /tmp/flink-status
      Tags:
        - Key: Name
          Value: telco-ods-demo-flink

  GeneratorInstance:
    Type: AWS::EC2::Instance
    DependsOn: KafkaInstance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: c5.2xlarge
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref PipelineSG
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/generator-setup.log 2>&1

          apt-get update
          apt-get install -y python3-pip python3-venv

          mkdir -p /opt/telco-generator
          chown -R ubuntu:ubuntu /opt/telco-generator
          cd /opt/telco-generator

          cat > /opt/telco-generator/env.sh << ENVEOF
          export KAFKA_BROKER=${KafkaInstance.PrivateIp}:9092
          export KAFKA_TOPIC=telco-raw-telemetry
          ENVEOF

          python3 -m venv venv
          source venv/bin/activate
          pip install confluent-kafka numpy

          touch /var/log/generator.log
          chown ubuntu:ubuntu /var/log/generator.log

          echo "GENERATOR_READY" > /tmp/generator-status
      Tags:
        - Key: Name
          Value: telco-ods-demo-generator

  FeastInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: t3.medium
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref FeastSG
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/feast-setup.log 2>&1

          apt-get update
          apt-get install -y python3-pip python3-venv

          mkdir -p /opt/feast
          cd /opt/feast

          python3 -m venv /opt/feast-env
          source /opt/feast-env/bin/activate
          pip install "feast[mongodb]>=0.37.0" "pymongo[srv]" pandas python-dotenv

          chown -R ubuntu:ubuntu /opt/feast /opt/feast-env

          touch /var/log/feast-materialize.log
          chown ubuntu:ubuntu /var/log/feast-materialize.log

          echo "FEAST_READY" > /tmp/feast-status
      Tags:
        - Key: Name
          Value: telco-ods-demo-feast

  # --- IAM for S3 access (Flink instance needs to download binaries) ---
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ArtifactRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::${S3ArtifactBucket}/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

Outputs:
  KafkaPrivateIP:
    Value: !GetAtt KafkaInstance.PrivateIp
    Description: Kafka broker private IP

  KafkaPublicIP:
    Value: !GetAtt KafkaInstance.PublicIp
    Description: Kafka broker public IP

  GeneratorPublicIP:
    Value: !GetAtt GeneratorInstance.PublicIp
    Description: Data generator public IP

  GeneratorPrivateIP:
    Value: !GetAtt GeneratorInstance.PrivateIp
    Description: Data generator private IP

  FlinkPublicIP:
    Value: !GetAtt FlinkInstance.PublicIp
    Description: Flink public IP

  FlinkPrivateIP:
    Value: !GetAtt FlinkInstance.PrivateIp
    Description: Flink private IP

  FlinkWebUI:
    Value: !Sub http://${FlinkInstance.PublicIp}:8081
    Description: Flink Web UI

  MLflowPublicIP:
    Value: !GetAtt MLflowInstance.PublicIp
    Description: MLflow public IP

  MLflowTrackingURL:
    Value: !Sub http://${MLflowInstance.PublicIp}:5002
    Description: MLflow tracking server

  MLflowServingURL:
    Value: !Sub http://${MLflowInstance.PublicIp}:5003/invocations
    Description: MLflow model serving endpoint

  DashboardURL:
    Value: !Sub http://${MLflowInstance.PublicIp}:8050
    Description: Live dashboard

  FeastPublicIP:
    Value: !GetAtt FeastInstance.PublicIp
    Description: Feast feature server public IP

  FeastPrivateIP:
    Value: !GetAtt FeastInstance.PrivateIp
    Description: Feast feature server private IP

  AtlasWhitelistIPs:
    Value: !Sub "${KafkaInstance.PublicIp}, ${GeneratorInstance.PublicIp}, ${FlinkInstance.PublicIp}, ${MLflowInstance.PublicIp}, ${FeastInstance.PublicIp}"
    Description: IPs to whitelist in MongoDB Atlas
